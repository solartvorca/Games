<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍄 НейроМарио</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .icon { font-size: 72px; margin-bottom: 12px; }
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .desc {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .btn {
            display: inline-block;
            padding: 14px 48px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(59,130,246,0.4);
        }
        .controls {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            font-size: 12px;
            color: #777;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🍄</div>
        <h1>НейроМарио</h1>
        <div class="desc">
            Платформер для запоминания таблицы «Нейрогенез».<br>
            Прыгай по платформам, собирай фигуры, отвечай на вопросы.
        </div>
        <a class="btn" href="mario.html">🎮 Играть</a>
        <div class="controls">
            ← → — движение · Пробел/↑ — прыжок · R — рестарт · P — пауза
        </div>
    </div>
</body>
</html>
